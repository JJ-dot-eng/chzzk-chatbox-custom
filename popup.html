<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>치지직 채팅 설정</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <h1>채팅 설정</h1>
        <p id="status" class="status" aria-live="polite">대기 중</p>
      </header>

      <nav class="tabs" role="tablist" aria-label="설정 분류">
        <button type="button" id="textTab" class="tab is-active" role="tab" aria-selected="true" aria-controls="textPanel" data-tab-target="textPanel">표시</button>
        <button type="button" id="styleTab" class="tab" role="tab" aria-selected="false" aria-controls="stylePanel" data-tab-target="stylePanel">꾸미기</button>
        <button type="button" id="settingsTab" class="tab" role="tab" aria-selected="false" aria-controls="settingsPanel" data-tab-target="settingsPanel">설정</button>
      </nav>

      <section id="textPanel" class="tab-panel is-active" role="tabpanel" aria-labelledby="textTab">
        <div class="toggles" aria-label="표시 옵션">
          <label class="toggle-row">
            <span><strong>닉네임</strong></span>
            <input type="checkbox" id="showNicknames">
          </label>

          <label class="toggle-row">
            <span><strong>배지</strong></span>
            <input type="checkbox" id="showBadges">
          </label>

          <label class="toggle-row">
            <span><strong>타임스탬프</strong></span>
            <input type="checkbox" id="showTimestamps">
          </label>

          <label class="toggle-row">
            <span><strong>후원 랭킹</strong></span>
            <input type="checkbox" id="showDonationRanking">
          </label>

          <label class="toggle-row">
            <span><strong>비로그인 채팅</strong></span>
            <input type="checkbox" id="useGuestChatFrame">
          </label>
        </div>
      </section>

      <section id="stylePanel" class="tab-panel" role="tabpanel" aria-labelledby="styleTab" hidden>
        <div class="toggles" aria-label="꾸미기 옵션">
          <div class="toggle-row toggle-row--with-disclosure">
            <button type="button" id="toggleChatBoxColorPanel" class="disclosure-button" aria-label="박스 색상 항목 펼치기" aria-expanded="false" aria-controls="chatBoxColorPanel"></button>
            <label class="toggle-row__label" for="showChatBoxes"><strong>채팅 박스</strong></label>
            <input type="checkbox" id="showChatBoxes">
          </div>

          <section id="chatBoxColorPanel" class="color-picker color-picker--sub" aria-label="채팅 박스 색상" hidden>
            <div class="color-picker__controls">
              <span id="colorPreview" class="color-preview" aria-hidden="true"></span>
              <input type="text" id="chatBoxColorHex" class="hex-input" inputmode="text" maxlength="7" spellcheck="false" aria-label="색상 코드">
              <button type="button" id="resetChatBoxColor" class="default-button">기본</button>
            </div>

            <div class="color-picker__body">
              <button type="button" id="colorField" class="color-field" aria-label="색상 영역">
                <span id="colorFieldHandle" class="color-field__handle"></span>
              </button>
              <input type="range" id="hueSlider" class="hue-slider" min="0" max="360" value="0" aria-label="색상 범위">
            </div>
          </section>

          <div class="toggle-row toggle-row--with-disclosure">
            <button type="button" id="toggleChatFontSizePanel" class="disclosure-button" aria-label="글씨 크기 항목 접기" aria-expanded="true" aria-controls="chatFontSizePanel"></button>
            <label class="toggle-row__label" for="showLargeText"><strong>글씨 크기 조정</strong></label>
            <input type="checkbox" id="showLargeText">
          </div>

          <section id="chatFontSizePanel" class="font-size-control font-size-control--sub" aria-label="글씨 크기">
            <div class="font-size-control__header">
              <strong>글씨 크기</strong>
              <output id="chatFontSizeValue" class="font-size-value" for="chatFontSizePt">13pt</output>
            </div>
            <div class="font-size-control__controls">
              <input type="range" id="chatFontSizePt" class="font-size-slider" min="8" max="36" step="1" value="13" aria-label="글씨 크기 pt">
              <button type="button" id="resetChatFontSize" class="default-button">기본</button>
            </div>
            <label class="font-size-control__toggle">
              <span><strong>닉네임 크기 따로 조정</strong></span>
              <input type="checkbox" id="useNicknameFontSize">
            </label>
            <div id="nicknameFontSizeControl" class="font-size-control__nested">
              <div class="font-size-control__header">
                <strong>닉네임 크기</strong>
                <output id="nicknameFontSizeValue" class="font-size-value" for="nicknameFontSizePt">13pt</output>
              </div>
              <div class="font-size-control__controls">
                <input type="range" id="nicknameFontSizePt" class="font-size-slider" min="8" max="36" step="1" value="13" aria-label="닉네임 크기 pt">
                <button type="button" id="resetNicknameFontSize" class="default-button">기본</button>
              </div>
            </div>
          </section>

          <label class="toggle-row">
            <span><strong>굵게</strong></span>
            <input type="checkbox" id="showBoldText">
          </label>

        </div>
      </section>

      <section id="settingsPanel" class="tab-panel" role="tabpanel" aria-labelledby="settingsTab" hidden>
        <div class="toggles" aria-label="설정 옵션">
          <label class="toggle-row">
            <span><strong>비로그인 버튼 표시</strong></span>
            <input type="checkbox" id="showGuestChatToggleButton">
          </label>
          <label class="toggle-row">
            <span><strong>미니 채팅창</strong></span>
            <input type="checkbox" id="useMiniFloatingChat">
          </label>
          <label class="toggle-row toggle-row--sub" data-parent-control="useMiniFloatingChat">
            <span><strong>전체화면에서만 표시</strong></span>
            <input type="checkbox" id="miniFloatingChatFullscreenOnly">
          </label>
          <label class="toggle-row">
            <span><strong>미니 채팅 버튼 표시</strong></span>
            <input type="checkbox" id="showMiniFloatingChatButton">
          </label>
          <label class="toggle-row">
            <span><strong>설정 아이콘 표시</strong></span>
            <input type="checkbox" id="showHeaderSettingsButton">
          </label>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
