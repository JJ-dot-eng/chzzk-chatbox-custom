<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>치지직 채팅 표시 토글</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <h1>채팅 표시</h1>
        <p id="status" class="status" aria-live="polite">대기 중</p>
      </header>

      <section class="toggles" aria-label="채팅 표시 옵션">
        <label class="toggle-row">
          <span>
            <strong>닉네임</strong>
            <small>작성자 이름</small>
          </span>
          <input type="checkbox" id="showNicknames">
        </label>

        <label class="toggle-row">
          <span>
            <strong>배지</strong>
            <small>닉네임 앞 아이콘</small>
          </span>
          <input type="checkbox" id="showBadges">
        </label>

        <label class="toggle-row">
          <span>
            <strong>타임스탬프</strong>
            <small>hh:mm</small>
          </span>
          <input type="checkbox" id="showTimestamps">
        </label>

        <label class="toggle-row">
          <span>
            <strong>채팅 박스</strong>
            <small>라운드 배경</small>
          </span>
          <input type="checkbox" id="showChatBoxes">
        </label>

        <label class="toggle-row">
          <span>
            <strong>큰 글씨</strong>
            <small>살짝 굵게</small>
          </span>
          <input type="checkbox" id="showLargeText">
        </label>
      </section>

      <section class="palette" aria-label="채팅 박스 색상">
        <div class="palette__header">
          <strong>박스 색상</strong>
          <small>채팅 박스 배경</small>
        </div>
        <div class="swatches" role="radiogroup" aria-label="채팅 박스 색상">
          <button type="button" class="swatch" data-chat-box-color="gray" aria-label="회색" style="--swatch: #808080"></button>
          <button type="button" class="swatch" data-chat-box-color="green" aria-label="초록" style="--swatch: #00c471"></button>
          <button type="button" class="swatch" data-chat-box-color="blue" aria-label="파랑" style="--swatch: #4b8bff"></button>
          <button type="button" class="swatch" data-chat-box-color="purple" aria-label="보라" style="--swatch: #8b5cf6"></button>
          <button type="button" class="swatch" data-chat-box-color="yellow" aria-label="노랑" style="--swatch: #f5bd23"></button>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
